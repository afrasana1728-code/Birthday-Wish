<!DOCTYPE html>
<html>
<head>
<title>Birthday Surprise</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html, body{
    margin:0;
    padding:0;
    height:100%;
}

/* Fullscreen */
body{
    height:100vh;
    width:100%;
    display:flex;
    justify-content:center;
    align-items:center;
    background: linear-gradient(135deg, #ffdde1, #c2e9fb, #e0c3fc);
    background-size:300% 300%;
    animation:bgMove 10s ease infinite;
    font-family:'Segoe UI', sans-serif;
    overflow:hidden;
}

/* Background animation */
@keyframes bgMove{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

/* Container */
.container{
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:20px;
    width:100%;
    max-width:500px;
    padding:10px;
    text-align:center;
}

/* Title */
.title{
    font-size:28px;
    color:#003366;
    text-shadow:0 0 10px white,0 0 20px #66ccff;
}

/* 💙 CLEAR GLOW HEART (NO BLUR) */
.heart{
    display:inline-block;
    margin-left:5px;
    animation:blueGlow 2s infinite alternate;
}

@keyframes blueGlow{
    from{
        text-shadow:0 0 5px #3399ff;
    }
    to{
        text-shadow:0 0 20px #3399ff, 0 0 30px #66ccff;
    }
}

/* Timer */
.timer{
    display:flex;
    justify-content:center;
    gap:12px;
}

.circle{
    width:75px;
    height:75px;
    border-radius:50%;
    background: rgba(255,255,255,0.9);
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

.circle span{
    font-size:16px;
    font-weight:bold;
}

/* Gallery */
.gallery{
    display:flex;
    justify-content:center;
    gap:15px;
}

.gallery img{
    width:85px;
    height:85px;
    border-radius:20px;
    object-fit:cover;
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
    transition:0.3s;
    animation:bounce 3s infinite ease-in-out;
}

.gallery img:hover{
    transform:scale(1.15);
}

@keyframes bounce{
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(-8px);}
}

/* Button */
button{
    padding:12px 30px;
    border:none;
    border-radius:30px;
    background: linear-gradient(to right,#ff4d6d,#0072ff);
    color:white;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:scale(1.1);
}

/* Floating hearts */
.heart-float{
    position:absolute;
    font-size:18px;
    animation:float 6s linear infinite;
}

@keyframes float{
    0%{transform:translateY(100vh);opacity:1;}
    100%{transform:translateY(-10vh);opacity:0;}
}

/* Mobile landscape */
@media (max-height:500px){
    .title{font-size:22px;}
    .circle{width:60px;height:60px;}
    .gallery img{width:65px;height:65px;}
    .container{gap:12px;}
}
</style>

</head>
<body>

<div class="container">

<h1 class="title">
Just a little surprise for you <span class="heart">💙</span>
</h1>

<div class="timer">
    <div class="circle"><span id="days">0</span><small>Days</small></div>
    <div class="circle"><span id="hours">0</span><small>Hours</small></div>
    <div class="circle"><span id="minutes">0</span><small>Min</small></div>
    <div class="circle"><span id="seconds">0</span><small>Sec</small></div>
</div>

<div class="gallery">
    <img src="/static/kawai1.jpg">
    <img src="/static/kawai2.jpg">
    <img src="/static/kawai3.jpg">
    <img src="/static/kawai4.jpg">
</div>

<button onclick="goNext()">Click Me 💖</button>

</div>

<script>
// Countdown
let birthday = new Date("April 5, 2026 23:59:59").getTime();

setInterval(()=>{
    let now = new Date().getTime();
    let diff = birthday - now;

    if(diff <= 0){
        document.getElementById("days").innerText = "0";
        document.getElementById("hours").innerText = "0";
        document.getElementById("minutes").innerText = "0";
        document.getElementById("seconds").innerText = "0";
        return;
    }

    let d = Math.floor(diff / (1000*60*60*24));
    let h = Math.floor((diff % (1000*60*60*24))/(1000*60*60));
    let m = Math.floor((diff % (1000*60*60))/(1000*60));
    let s = Math.floor((diff % (1000*60))/1000);

    document.getElementById("days").innerText = d;
    document.getElementById("hours").innerText = h;
    document.getElementById("minutes").innerText = m;
    document.getElementById("seconds").innerText = s;
},1000);

// Floating hearts
setInterval(()=>{
    let heart = document.createElement("div");
    heart.className="heart-float";
    heart.innerHTML = Math.random() > 0.5 ? "💖" : "💙";
    heart.style.left = Math.random()*100 + "vw";
    heart.style.fontSize = (10 + Math.random()*20) + "px";
    document.body.appendChild(heart);

    setTimeout(()=>heart.remove(),6000);
},300);

// Next page
function goNext(){
    window.location.href="/page1";
}
</script>

</body>
</html>
